<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DeeBee</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body class="dev">
  <div id="hud">
    <div class="hud-controls">
      <button id="mute-all-btn" class="hud-btn" title="Mute all meows">
        <svg viewBox="0 0 24 24" class="ico-on"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z" fill="currentColor"/></svg>
        <svg viewBox="0 0 24 24" class="ico-off"><path d="M3 10v4h4l5 5V5L7 10H3zm12.5-2L14 9.5l2 2L14 13.5l1.5 1.5 2-2 2 2L21 13.5l-2-2 2-2L19.5 8l-2 2-2-2z" fill="currentColor"/></svg>
      </button>
      <button id="hide-hud-btn" class="hud-btn" title="Hide HUD">–</button>
      <button id="quit-btn" class="hud-btn" title="Quit DeeBee (Ctrl+Shift+Q)">✕</button>
    </div>
    <div>distance: <span id="dist">—</span></div>
    <div>state: <span id="state">—</span></div>
    <div>tracking: <span id="track">off</span></div>
    <div>app: <span id="app">—</span> <span id="mood" class="mood-tag">—</span></div>
  </div>
  <button id="show-hud-btn" title="Show DeeBee HUD">DB</button>

  <div id="hot-pomodoro" class="hot-zone"></div>
  <div id="hot-notes" class="hot-zone"></div>

  <!-- Cat body (final art from Illustrator).
       Drops down during pomodoro break phases; click the tail 3× to break.
       Tail layered BEHIND the body; click triggers a vertical bounce. -->
  <div id="cat-body" class="cat-body">
    <div class="cat-body-inner">
      <button class="cat-tail" id="cat-tail" aria-label="tickle">
        <img src="cat-tail.svg" alt="" draggable="false">
      </button>
      <img class="cat-body-shape" src="cat-body.svg" alt="" draggable="false">
    </div>
  </div>

  <!-- Pomodoro dropdown (cat-food can design) -->
  <div id="pomodoro-panel" class="panel panel-can">
    <button id="pomodoro-mute" class="mute-btn mute-btn-can" title="mute meow">
      <svg viewBox="0 0 24 24" class="ico-on"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" class="ico-off"><path d="M3 10v4h4l5 5V5L7 10H3zm12.5-2L14 9.5l2 2L14 13.5l1.5 1.5 2-2 2 2L21 13.5l-2-2 2-2L19.5 8l-2 2-2-2z" fill="currentColor"/></svg>
    </button>
    <div class="pomo-time" id="pomo-time">25:00</div>
    <div class="pomo-phase" id="pomo-phase">work</div>
    <div class="pomo-controls">
      <button id="pomo-reset" class="pomo-btn">RESET</button>
      <button id="pomo-start" class="pomo-btn pomo-btn-primary">START</button>
      <button id="pomo-skip"  class="pomo-btn">SKIP</button>
    </div>
    <div class="pomo-settings">
      <label><span>WORK</span><input type="number" id="pomo-work"  min="1" max="120"></label>
      <label><span>SHORT</span><input type="number" id="pomo-short" min="1" max="60"></label>
      <label><span>LONG</span><input type="number" id="pomo-long"  min="1" max="60"></label>
    </div>
  </div>
